# Copy into each Magento module repo as .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qa:
    uses: pliou/ppl-ci/.github/workflows/magento-module-ci.yml@main
    with:
      php-version: '8.4'
    secrets: inherit   # passes COMPOSER_AUTH through if set (optional; enables phpstan/phpunit/vibecoder)
